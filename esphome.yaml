number:
  - platform: template
    name: Screen Backlight Timeout
    optimistic: true
    id: id_num_bl_timeout
    initial_value: 240
    restore_value: true
    min_value: 10
    max_value: 300
    step: 5
    mode: box
    unit_of_measurement: "s"
    icon: mdi:timer-outline
    entity_category: config

  - platform: template
    id: id_num_awake_backlight_brightness
    name: "Awake Screen Backlight Brightness Level"
    min_value: 21
    max_value: 100
    step: 1
    optimistic: true
    unit_of_measurement: "%"
    icon: mdi:brightness-6
    entity_category: config
    on_value:
      
    - if:
        condition:
          - lvgl.is_paused
          - light.is_off: id_light_backlight_brightness
        then:
          - lvgl.resume
          - light.turn_on: 
              id: id_light_backlight_brightness
              brightness: !lambda return x / 100.0;
              transition_length: 300ms
              color_mode: BRIGHTNESS

  - platform: template
    id: id_num_idle_backlight_brightness
    name: "Idle Screen Backlight Brightness Level"
    min_value: 0
    max_value: 20
    step: 1
    optimistic: true
    unit_of_measurement: "%"
    icon: mdi:brightness-4
    entity_category: config
    on_value:
      
      if:
        condition:
          - lvgl.is_paused
          - light.is_off: id_light_backlight_brightness
        then:
          - lvgl.resume
          - light.turn_on: 
              id: id_light_backlight_brightness
              brightness: !lambda return x / 100.0;
              transition_length: 300ms
              color_mode: BRIGHTNESS
text_sensor:
  - platform: homeassistant
    id: weather_state
    entity_id: weather.home
    on_value:
      then:
        - script.execute: update_weather_icon

  - platform: homeassistant
    id: player_state
    entity_id: media_player.voice_mass_3

    on_value:
      then:
        - if:
            condition:
              text_sensor.state:
                id: player_state
                state: "playing"
            then:
              - lvgl.label.update:
                  id: icon_play
                  text: "\U000F03E4"   # PAUSE
            else:
              - lvgl.label.update:
                  id: icon_play
                  text: "\U000F040A"   # PLAY

  - platform: homeassistant
    id: media_title
    entity_id: media_player.voice_mass_3
    attribute: media_title
    on_value:
      then:
        - script.execute: update_media_text

  - platform: homeassistant
    id: media_artist
    entity_id: media_player.voice_mass_3
    attribute: media_artist
    on_value:
      then:
        - script.execute: update_media_text

  - platform: homeassistant
    id: media_state
    entity_id: media_player.voice_mass_3
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x == "playing";'
            then:
              - lvgl.widget.show: media_info_label
            else:
              - lvgl.widget.hide: media_info_label

  - platform: homeassistant
    id: media_content_id
    entity_id: media_player.voice_mass_3
    attribute: media_content_id
    on_value:
      then:
        - script.execute: update_media_icon
  - platform: homeassistant
    id: cas_elecrow_txt
    entity_id: input_number.cas_elecrow
    on_value:
      then:
        - lvgl.label.update:
            id: timer_label_inner
            text: !lambda |-
              int minuty = atoi(x.c_str());
              static char buf[10];
              snprintf(buf, sizeof(buf), "%d", minuty);
              return buf;

  - platform: homeassistant
    id: zas_l_state
    entity_id: switch.zasuvka_mycka
    on_value:
      then:
        - lvgl.label.update:
            id: zas_l_icon
            text_color: !lambda |-
              if (x == "on") return lv_color_hex(0xFF0000);  // červená
              return lv_color_hex(0x696969);                // šedá

  - platform: homeassistant
    id: zas_p_state
    entity_id: switch.zasuvka_pracka
    on_value:
      then:
        - lvgl.label.update:
            id: zas_p_icon
            text_color: !lambda |-
              if (x == "on") return lv_color_hex(0xFF0000);
              return lv_color_hex(0x696969);

  - platform: homeassistant
    id: svatek_text
    entity_id: sensor.dnes_ma_svatek
    on_value:
      then:
        - lvgl.label.update:
            id: svatek_info_label
            text: !lambda |-
              if (x.length() > 0) {
                static std::string txt;
                txt = "Dnes má svátek: " + x;
                return txt.c_str();
              }
              return "---";

  - platform: homeassistant
    id: moon_phase_name
    entity_id: sensor.moon_faze
    on_value:
      then:
        - lvgl.label.update:
            id: moon_phase_label
            text: !lambda |-
              if (x.length() > 0) {
                return x.c_str();
              }
              return "---";

  - platform: homeassistant
    id: moon_phase_icon
    entity_id: sensor.moon_faze
    attribute: entity_picture
    on_value:
      then:
        - lvgl.label.update:
            id: moon_icon_label
            text: !lambda |-
              if (x.find("first_quarter") != std::string::npos) return "\U000F0F61";
              if (x.find("full_moon") != std::string::npos) return "\U000F0F62";
              if (x.find("last_quarter") != std::string::npos) return "\U000F0F63";
              if (x.find("new_moon") != std::string::npos) return "\U000F0F64";
              if (x.find("waning_crescent") != std::string::npos) return "\U000F0F65";
              if (x.find("waning_gibbous") != std::string::npos) return "\U000F0F66";
              if (x.find("waxing_crescent") != std::string::npos) return "\U000F0F67";
              if (x.find("waxing_gibbous") != std::string::npos) return "\U000F0F68";
              return "\U000F0F64";
  - platform: homeassistant
    id: text_stav
    entity_id: lock.zamek_vrata
    on_value:
      - lvgl.label.update:
          id: lock_label
          text: !lambda |-
            if (x == "locked") return std::string("Zamčeno");
            if (x == "unlocked") return std::string("Odemčeno");
            return std::string("Neznámý stav");
  - platform: homeassistant
    id: media_artist_1
    entity_id: media_player.voice_mass_3
    attribute: media_artist
    on_value:
      - lvgl.label.update:
          id: artist_label
          text: !lambda "return x.empty() ? std::string(\"-\") : x;"

  - platform: homeassistant
    id: media_title_1
    entity_id: media_player.voice_mass_3
    attribute: media_title
    on_value:
      - lvgl.label.update:
          id: title_label_1
          text: !lambda "return x.empty() ? std::string(\"-\") : x;"

  - platform: homeassistant
    id: media_state_1
    entity_id: media_player.voice_mass_3
    on_value:
      - lvgl.label.update:
          id: playpause_label
          text: !lambda |-
            return std::string(x == "playing" ? "\U000F03E4" : "\U000F040A");
      - lvgl.widget.update:
          id: prev_btn
          opa: !lambda "return (x == \"unavailable\" || x == \"unknown\") ? 80 : 255;"
      - lvgl.widget.update:
          id: next_btn
          opa: !lambda "return (x == \"unavailable\" || x == \"unknown\") ? 80 : 255;"
      - lvgl.widget.update:
          id: playpause_btn
          opa: !lambda "return (x == \"unavailable\" || x == \"unknown\") ? 80 : 255;"
      - lvgl.widget.update:
          id: volume_slider
          clickable: !lambda "return !(x == \"unavailable\" || x == \"unknown\");"

  - platform: homeassistant
    id: mute_state
    entity_id: media_player.voice_mass
    attribute: is_volume_muted
    on_value:
      - lvgl.label.update:
          id: mute_label
          text: !lambda |-
            return std::string(x == "True" ? "\U000F0583" : "\U000F0580");

  - platform: homeassistant
    id: zvuk_obyvak_state
    entity_id: switch.zvuk_obyvak
    on_value:
      - lvgl.widget.update:
          id: zvuk_switch
          state:
            checked: !lambda "return x == \"on\";"
  - platform: homeassistant
    id: media_image_url
    entity_id: media_player.voice_mass_3
    attribute: entity_picture
    on_value:
      then:
        - globals.set:
            id: sendspin_album_art_valid
            value: "false"
        - script.execute: album_art_timeout_fallback
        - lambda: |-
            if (x.empty() || x.rfind("http", 0) != 0) return;
            id(id_online_img_cover).set_url(x.c_str());
        - component.update: id_online_img_cover
sensor:
  - platform: homeassistant
    id: album_color_r
    entity_id: input_text.album_color_r

  - platform: homeassistant
    id: album_color_g
    entity_id: input_text.album_color_g
  - platform: homeassistant
    id: album_color_b
    entity_id: input_text.album_color_b
    on_value:
      then:
        - lambda: |-
            uint8_t r = (uint8_t)id(album_color_r).state;
            uint8_t g = (uint8_t)id(album_color_g).state;
            uint8_t b = (uint8_t)id(album_color_b).state;

            uint8_t rd = r / 2;
            uint8_t gd = g / 2;
            uint8_t bd = b / 2;

            uint8_t rl = (r + 255) / 2;
            uint8_t gl = (g + 255) / 2;
            uint8_t bl = (b + 255) / 2;

            lv_color_t col_main  = lv_color_make(r,  g,  b);
            lv_color_t col_dark  = lv_color_make(rd, gd, bd);
            lv_color_t col_light = lv_color_make(rl, gl, bl);

            float luminance       = 0.299f * r  + 0.587f * g  + 0.114f * b;
            float luminance_dark  = 0.299f * rd + 0.587f * gd + 0.114f * bd;
            float luminance_light = 0.299f * rl + 0.587f * gl + 0.114f * bl;

            lv_color_t text_on_main  = (luminance       > 128) ? lv_color_make(0,0,0) : lv_color_make(255,255,255);
            lv_color_t text_on_dark  = (luminance_dark  > 128) ? lv_color_make(0,0,0) : lv_color_make(255,255,255);
            lv_color_t text_on_light = (luminance_light > 128) ? lv_color_make(0,0,0) : lv_color_make(255,255,255);

            // Pozadí stránky
            lv_obj_set_style_bg_color(lv_scr_act(), col_dark, LV_PART_MAIN);

            // Kontejner: artist + title [row 0]
            lv_obj_t *artist_parent = lv_obj_get_parent(id(artist_label));
            lv_obj_set_style_bg_color(artist_parent, col_dark, LV_PART_MAIN);
            lv_obj_set_style_bg_opa(artist_parent, LV_OPA_COVER, LV_PART_MAIN);
            lv_obj_set_style_text_color(id(artist_label), text_on_dark, LV_PART_MAIN);
            lv_obj_set_style_text_color(id(title_label_1), text_on_dark, LV_PART_MAIN);

            // Kontejner: playpause + mute [row 1]
            lv_obj_t *play_parent = lv_obj_get_parent(id(playpause_btn));
            lv_obj_set_style_bg_color(play_parent, col_dark, LV_PART_MAIN);
            lv_obj_set_style_bg_opa(play_parent, LV_OPA_COVER, LV_PART_MAIN);

            lv_obj_set_style_bg_color(id(playpause_btn), col_main, LV_PART_MAIN);
            lv_obj_set_style_text_color(id(playpause_label), text_on_main, LV_PART_MAIN);

            lv_obj_set_style_bg_color(id(mute_btn), col_main, LV_PART_MAIN);
            lv_obj_set_style_text_color(id(mute_label), text_on_main, LV_PART_MAIN);

            // Kontejner: prev + next [row 2]
            lv_obj_t *nav_parent = lv_obj_get_parent(id(prev_btn));
            lv_obj_set_style_bg_color(nav_parent, col_dark, LV_PART_MAIN);
            lv_obj_set_style_bg_opa(nav_parent, LV_OPA_COVER, LV_PART_MAIN);

            lv_obj_set_style_bg_color(id(prev_btn), col_main, LV_PART_MAIN);
            lv_obj_set_style_bg_color(id(next_btn), col_main, LV_PART_MAIN);

            // Kontejner: volume slider
            lv_obj_t *vol_parent = lv_obj_get_parent(id(volume_slider));
            lv_obj_set_style_bg_color(vol_parent, col_dark, LV_PART_MAIN);
            lv_obj_set_style_bg_opa(vol_parent, LV_OPA_COVER, LV_PART_MAIN);

            lv_obj_set_style_bg_color(id(volume_slider), col_light, LV_PART_INDICATOR);
            lv_obj_set_style_bg_color(id(volume_slider), col_light, LV_PART_KNOB);

            // Progress bar
            lv_obj_set_style_bg_color(id(progress_bar), col_dark, LV_PART_MAIN);
            lv_obj_set_style_bg_color(id(progress_bar), col_light, LV_PART_INDICATOR);

            // zvuk_switch tlačítko
            lv_obj_set_style_bg_color(id(zvuk_switch), col_main, LV_PART_MAIN);
  - platform: homeassistant
