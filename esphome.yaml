  - platform: homeassistant
    id: media_position
    entity_id: media_player.voice_mass_3
    attribute: media_position
    on_value:
      - lvgl.bar.update:
          id: progress_bar
          value: !lambda |-
            float dur = id(media_duration).state;
            if (dur <= 0) return 0;
            return (int)((x / dur) * 100.0f);

  - platform: homeassistant
    id: media_duration
    entity_id: media_player.voice_mass_3
