esphome:
  name: panel3b
  friendly_name: "Panel Chodba"
  area: ${device_area}
  min_version: 2025.11.0
  platformio_options:
    build_unflags: -Werror=all
    board_build.flash_mode: dio
    build_flags: 
      - -DBOARD_HAS_PSRAM
    board_build.esp-idf.memory_type: qio_opi
    board_upload.maximum_ram_size: 524288
    board_build.flash_size: 16MB
    # No second OTA partition. Must be flashed through serial (hint: ser2net)
#    board_build.partitions: "../../../hmi-garage/custom_partition_no_ota.csv"
  on_boot:
    - priority: 500 # a bit after sensor init
      then:
        - number.set:
            id: id_num_awake_backlight_brightness
            value: 100
        - number.set:
            id: id_num_idle_backlight_brightness
            value: 0
    
 

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  cpu_frequency : 240MHz
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESPTOOLPY_FLASHSIZE_8MB: "n"
      CONFIG_FREERTOS_HZ: "1000"
      CONFIG_ESP_DEFAULT_CPU_FREQ_MHZ_240: y
      CONFIG_ESPTOOLPY_FLASHMODE_QIO: y
      CONFIG_ESPTOOLPY_FLASHFREQ_80M: y
#      CONFIG_ESPTOOLPY_FLASHFREQ_120M: y
      CONFIG_SPIRAM_MODE_OCT: y
      CONFIG_IDF_EXPERIMENTAL_FEATURES: y
      CONFIG_SPIRAM_SPEED_80M: y
#      CONFIG_SPIRAM_SPEED_120M: y
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: y
      #CONFIG_COMPILER_OPTIMIZATION_SIZE: y
      CONFIG_COMPILER_OPTIMIZATION_PERF: y
      #CONFIG_COMPILER_OPTIMIZATION_DEBUG: y
    advanced:
      loop_task_stack_size: 8704
# Enable Home Assistant API
psram: # (Auto-commented)
   mode: octal
   speed: 80MHz
logger:
  level: INFO

api:
  

ota:
  - platform: esphome
    
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: 192.168.xx.xx
    gateway: 192.168.xx.xx
    subnet: 255.255.255.0
  ap:
    ssid: "neco sem dej"
preferences: 
i2c:
  sda: 8
  scl: 9
  frequency: 400kHz
  scan: false
  id: bus_a
ch422g:
  - id: io_ex


    
display:
  - platform: mipi_rgb
    model: RPI
    id: device_display
    update_interval: never
    auto_clear_enabled: false
    color_order: RGB
    pclk_frequency: 16MHz
    dimensions:
      width: 800
      height: 480
    reset_pin:
      ch422g: io_ex
      number: 3
    de_pin:
      number: 5
    hsync_pin:
      number: 46
      ignore_strapping_warning: true
    vsync_pin:
      number: 3
      ignore_strapping_warning: true
    pclk_pin: 7
    pclk_inverted: true
    hsync_back_porch: 8
    hsync_front_porch: 8
    hsync_pulse_width: 4
    vsync_back_porch: 16
    vsync_front_porch: 16
    vsync_pulse_width: 4
    data_pins:
      red:
        - 1         #r3.
        - 2         #r4.
        - 42        #r5
        - 41        #r6
        - 40        #r7
      blue:
        - 14        #b3
        - 38        #b4
        - 18        #b5
        - 17        #b6
        - 10        #b7
      green:
        - 39        #g2
        - 0         #g3.
        - 45        #g4
        - 48        #g5
        - 47        #g6
        - 21        #g7



touchscreen:
  platform: gt911
  address: 0x5D
  id: my_touchscreen
  interrupt_pin: 4
  reset_pin:
    ch422g: io_ex
    number: 1
 
  on_touch:
   - lambda: |-
        ESP_LOGI("Touch", "Touch detected at x=%d, y=%d", touch.x, touch.y);
   
  on_update:
    - lambda: |-
          for (auto touch: touches)  {
              if (touch.state <= 2) {
                ESP_LOGI("Touch points:", "id=%d x=%d, y=%d x.raw=%d, y.raw=%d", touch.id, touch.x, touch.y, touch.x_raw, touch.y_raw);
              }
          }  
  on_release:
    then:
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:


time:
  - platform: homeassistant
    id: time_comp
    on_time_sync:
      - script.execute: time_update
    on_time:
      - minutes: '*'
        seconds: 0
        then:
          - script.execute: time_update

binary_sensor:
 ## Status used for weather status 
  - platform: status
    name: Status sensor
globals:
  - id: timer_seconds
    type: int
    restore_value: no
    initial_value: '0'
  - id: sendspin_album_art_valid
    type: bool
    restore_value: no
    initial_value: "false"
script:
  - id: time_update
    then:
      - lvgl.indicator.update:
          id: minute_hand
          value: !lambda |-
            return id(time_comp).now().minute;
      - lvgl.indicator.update:
          id: hour_hand
          value: !lambda |-
            auto now = id(time_comp).now();
            return std::fmod(now.hour, 12) * 60 + now.minute;
      - lvgl.label.update:
          id: date_label
          text: !lambda |-
            static const char * const mon_names[] = {"LED", "ÚNO", "BŘE", "DUB", "KVĚ", "ČER",
                                                     "ČVC", "SRP", "ZÁŘ", "ŘÍJ", "LIS", "PRO"};
            static char date_buf[8];
            auto now = id(time_comp).now();
            snprintf(date_buf, sizeof(date_buf), "%s %2d", mon_names[now.month-1], now.day_of_month);
            return date_buf;
          text_color: 0x00BFFF
      - lvgl.label.update:
          id: day_label
          text: !lambda |-
            static const char * const day_names[] = {"NE", "PO", "ÚT", "ST", "ČT", "PÁ", "SO"};
            return day_names[id(time_comp).now().day_of_week - 1];
          text_color: 0x00BFFF

  - id: update_weather_icon
    then:
      - lambda: |-
          std::string s = id(weather_state).state;

          if (s == "sunny")
            lv_img_set_src(id(weather_icon), id(img_jasno));
          else if (s == "partlycloudy")
            lv_img_set_src(id(weather_icon), id(img_polojasno));
          else if (s == "cloudy")
            lv_img_set_src(id(weather_icon), id(img_zatazeno));
          else if (s == "rainy")
            lv_img_set_src(id(weather_icon), id(img_dest));
          else if (s == "pouring")
            lv_img_set_src(id(weather_icon), id(img_sprsky));
          else if (s == "snowy")
            lv_img_set_src(id(weather_icon), id(img_snezeni));
          else if (s == "snowy-rainy")
            lv_img_set_src(id(weather_icon), id(img_snih_s_destem));
          else if (s == "lightning")
            lv_img_set_src(id(weather_icon), id(img_blesky));
          else if (s == "lightning-rainy")
            lv_img_set_src(id(weather_icon), id(img_bourky_s_destem));
          else if (s == "fog")
            lv_img_set_src(id(weather_icon), id(img_mlhy));
          else if (s == "hail")
            lv_img_set_src(id(weather_icon), id(img_kroupy));
          else if (s == "windy")
            lv_img_set_src(id(weather_icon), id(img_vetrno));
          else if (s == "windy-variant")
            lv_img_set_src(id(weather_icon), id(img_promenlivy_vitr));
          else if (s == "clear-night")
            lv_img_set_src(id(weather_icon), id(img_jasna_noc));
          else if (s == "exceptional")
            lv_img_set_src(id(weather_icon), id(img_varovani));

  - id: update_media_text
    then:
      - lvgl.label.update:
          id: media_info_label
          text: !lambda |-
            std::string artist = id(media_artist).state;
            std::string title = id(media_title).state;

            if (artist.length() == 0) return title.c_str();
            if (title.length() == 0) return artist.c_str();

            static std::string txt;
            txt = artist + " - " + title;
            return txt.c_str();

  - id: update_media_icon
    then:
      - lambda: |-
          std::string idd = id(media_content_id).state;

          if (idd.rfind("http", 0) == 0) {
            // rádio (stream)
            lv_label_set_text(id(media_icon), "\U000F043B");
          } else {
            // lokální soubor (disk)
            lv_label_set_text(id(media_icon), "\U000F0960");
          }
 
  - id: album_art_timeout_fallback
    mode: restart
    then:
      - delay: 800ms
      - if:
          condition:
            lambda: 'return !id(sendspin_album_art_valid);'
          then:
            - lvgl.image.update:
                id: album_art_widget
                src: fallback_playing_image

  

 

  - id: time_update_1
    then:
      - lvgl.label.update:
          id: clock_label
          text: !lambda |-
            return id(time_comp).now().strftime("%H:%M:%S");
      - lvgl.label.update:
          id: date_value_label
          text: !lambda |-
            static const char * const mon_names[] = {"Led", "Un", "Bre", "Dub", "Kve", "Cvn",
                                                     "Cvc", "Srp", "Zar", "Rij", "Lis", "Pro"};
            static char date_buf[8];
            auto now = id(time_comp).now();
            snprintf(date_buf, sizeof(date_buf), "%s %2d", mon_names[now.month-1], now.day_of_month);
            return date_buf;


